[flake8]
max-line-length = 88
extend-ignore = E203
per-file-ignores =
    # Parser files contain long AWS CLI command strings that cannot be wrapped
    src/parsers/*:E501
    # Legacy config and license files not in scope for line-length enforcement
    src/config/*:E501
    src/license_validator.py:E501
    # nlp_utils contains long regex patterns that cannot be split
    src/core/nlp_utils.py:E501
    # execution_engine contains long error message strings
    src/core/execution_engine.py:E501
