name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: pytest
        run: python -m pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: black --check
        run: python -m black --check --target-version py312 src/ tests/ aws-nlp.py conftest.py

      - name: isort --check-only
        run: python -m isort --check-only src/ tests/ aws-nlp.py conftest.py

      - name: flake8
        run: python -m flake8 src/ tests/ aws-nlp.py conftest.py

  package:
    name: Package sanity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package in editable mode
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Entry point resolves
        run: aws-nlp --help

      - name: python -m src.aws_nlp resolves
        run: python -m src.aws_nlp --help
